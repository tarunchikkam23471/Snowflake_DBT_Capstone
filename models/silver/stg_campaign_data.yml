version: 2

models:
  - name: stg_campaign_data
    description: "Silver layer cleaned campaign data with derived metrics and ROI validation."

    columns:

      - name: campaign_id
        description: "Unique identifier for each campaign."
        tests:
          - not_null
          - unique

      - name: campaign_name
        description: "Standardized campaign name."
        tests:
          - not_null

      - name: campaign_type
        description: "Type of marketing campaign."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Discount Event
                  - Product Launch
                  - Clearance
                  - Seasonal Promotion
                  - Brand Awareness

      - name: channel
        description: "Marketing channel used for the campaign."
        tests:
          - not_null

      - name: start_date
        description: "Campaign start date."
        tests:
          - not_null

      - name: end_date
        description: "Campaign end date."
        tests:
          - not_null

      - name: campaign_duration_days
        description: "Calculated duration of campaign."
        tests:
          - not_null

      - name: audience_segment
        description: "Derived high-level audience segment."
        tests:
          - accepted_values:
              arguments:
                values:
                  - Students
                  - Families
                  - Professionals
                  - Seniors
                  - Other

      - name: age_range
        description: "Age group extracted from target audience."

      - name: location_type
        description: "Location category extracted from target audience."

      - name: budget
        description: "Normalized campaign budget."
        tests:
          - not_null

      - name: total_cost
        description: "Total cost spent on campaign."
        tests:
          - not_null

      - name: total_revenue
        description: "Total revenue generated by campaign."
        tests:
          - not_null

      - name: roi_calculation
        description: "ROI value provided in source."

      - name: expected_roi
        description: "Recalculated ROI using revenue and cost."

      - name: roi_validation_flag
        description: "Flag indicating whether ROI calculation matches expected value."